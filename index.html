<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Facebook Post Generator</title>

<style>
body{
    margin:0;
    padding:20px;
    background:#f0f2f5;
    font-family:Arial,sans-serif;
}

.container{
    max-width:500px;
    margin:auto;
}

.controls{
    background:white;
    padding:15px;
    border-radius:12px;
    margin-bottom:15px;
    box-shadow:0 2px 10px rgba(0,0,0,.1);
}

.controls h2{
    margin-top:0;
}

input{
    width:100%;
    padding:12px;
    margin-top:8px;
    margin-bottom:12px;
    box-sizing:border-box;
}

.post{
    background:white;
    border-radius:12px;
    overflow:hidden;
    box-shadow:0 2px 10px rgba(0,0,0,.1);
}

.header{
    display:flex;
    align-items:center;
    padding:12px;
}

.avatar{
    width:48px;
    height:48px;
    border-radius:50%;
    object-fit:cover;
    margin-right:10px;
}

.name{
    font-weight:bold;
    font-size:15px;
}

.time{
    color:#65676b;
    font-size:12px;
}

.text{
    padding:0 12px 12px;
    font-size:15px;
    line-height:1.4;
}

.postimg{
    width:100%;
    display:block;
}

.stats{
    padding:10px 12px;
    color:#65676b;
    border-bottom:1px solid #ddd;
    font-size:14px;
}

.actions{
    display:flex;
    justify-content:space-around;
    padding:12px;
    color:#65676b;
    font-weight:bold;
}

.actions div{
    flex:1;
    text-align:center;
}
</style>
</head>

<body>

<div class="container">

<div class="controls">
<h2>Facebook Post Generator</h2>

<input type="text" id="nameInput" placeholder="Enter Name">

<input type="file" id="photoInput" accept="image/*">
</div>

<div class="post">

<div class="header">
<img id="avatar"
class="avatar"
src="https://via.placeholder.com/100">

<div>
<div class="name" id="username">Your Name</div>
<div class="time">Today at 10:00 AM</div>
</div>
</div>

<div class="text">
Life is better when you're surrounded by good friends and great memories. ✨
<br><br>
Cherish the moments that make you smile. 😊
</div>

<img
src="IMG_20260624_032308.jpg"
class="postimg">

<div class="stats">
👍 ❤️ 😮 You and 99 others · 100 Comments
</div>

<div class="actions">
<div>Like</div>
<div>Comment</div>
<div>Share</div>
</div>

</div>

</div>

<script>
document.getElementById('nameInput').addEventListener('input',function(){
document.getElementById('username').innerText=this.value||'Your Name';
});

document.getElementById('photoInput').addEventListener('change',function(e){

const file=e.target.files[0];
if(!file)return;

const reader=new FileReader();

reader.onload=function(ev){
document.getElementById('avatar').src=ev.target.result;
}

reader.readAsDataURL(file);

});
</script>

</body>
</html>
